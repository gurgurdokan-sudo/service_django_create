<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | 民の家</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f4f4f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 380px; background: #fff; border-radius: 10px;
                  padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="h4 mb-4 text-center">民の家<br><small class="text-secondary fs-6">業務管理システム</small></h1>
    {% if form.errors %}
      <div class="alert alert-danger py-2">ログインIDまたはパスワードが正しくありません。</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label" for="id_username">ログインID</label>
        <input type="text" name="username" id="id_username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label" for="id_password">パスワード</label>
        <input type="password" name="password" id="id_password" class="form-control" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn btn-primary w-100">ログイン</button>
    </form>
    <p class="text-secondary mt-3 mb-0" style="font-size:0.8rem;">
      パスワードが未設定・不明な場合は管理者に連絡してください。
    </p>
  </div>
</body>
</html>
