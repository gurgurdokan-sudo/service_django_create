{% load static %}
<link rel="stylesheet" href="{% static 'main.css' %}">
<!-- 1. サービスの追加ボタン -->
 <body>
<div class="action-area">
  <!-- type="button" を明示して、フォーム送信を防ぎます -->
  <button type="button" id="openServiceModal" class="btn btn-create">サービスを追加する</button>
</div>

<!-- 2. ポップアップ（dialogタグ） -->
<!-- classに "modal-top" を追加して上部配置を制御します -->
<dialog id="serviceModal" class="modal-dialog modal-top">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="page-title">サービス選択</h2>
      <button type="button" class="close-icon-btn" id="closeBtn">×</button>
    </div>

    <form method="POST" action="." id="serviceForm">
      {% csrf_token %}
      <div class="table-scroll-container">
        <table class="data-table select-table">
          <thead>
            <tr>
              <th>選択</th>
              <th>サービス内容</th>
              <th>滞在時間</th>
              <th>単位</th>
            </tr>
          </thead>
          <tbody>
            {% for s in context.service %}
            <tr>
              <td class="text-center">
                <input type="radio" name="selected_service" value="{{ s.id }}" id="s_{{ s.id }}">
              </td>
              <td><label for="s_{{ s.id }}">{{ s.service_name }}</label></td>
              <td>{{ s.get_stay_time_category_display }}</td>
              <td>{{ s.unit }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="cancelBtn">キャンセル</button>
        <button type="submit" class="btn btn-create">選択を確定する</button>
      </div>
    </form>
  </div>
</dialog>
<script src="{% static 'popup.js' %}"></script>
</body>
