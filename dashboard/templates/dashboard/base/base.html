<!DOCTYPE html>
<html lang="ja">
{% load static %}
{% load tz %}
<head>
    <meta charset="UTF-8">
    <title>民の家＜サービス提供票＞</title>
    {% load static %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
    /* サイドバーの基本設定 */
    #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000;
        width: 1px; 
        height: 100vh;
        transition: width 0.3s ease; /* アニメーション速度 */
        overflow-x: hidden;
        white-space: nowrap;
    }

    /* ホバー時に展開 */
    #sidebar:hover {
        width: 250px; /* 展開時の幅 */
    }

    /* 閉じてる時は文字を隠す（透過度で調整するとスムーズ） */
    .sidebar-text {
        opacity: 0;
        transition: opacity 0.2s ease;
    }

    #sidebar:hover .sidebar-text {
        opacity: 1;
    }

    #main-content {
        margin-left: 0;
        margin-top:0;
    }
    </style>
    {% block css %}
    {% endblock css %}
</head>
<body>
    <a href=" {% url 'dashboard:user_list' %}">＜＜タイトルに戻る</a>
    <span>あとで実装パンくずリスト</span>
    {% block script %}
    {% endblock script %}
    <div class="position-relative">
        <!-- サイドバー -->
        <div id="sidebar">
            {% include "dashboard/components/sidebar.html" %}
        </div>

        <!-- メインコンテンツ -->
        <main id="main-content" class="flex-grow-1 p-4 bg-light">
        {% block body %}
        {% endblock body%}
        </main>
    </div>
</body>
</html>
