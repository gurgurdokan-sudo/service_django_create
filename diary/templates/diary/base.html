{% load static %}<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ user.get_full_name|default:'' }}さん日報{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'diary/css/style.css' %}">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="{% url 'diary:list' %}">📔 マイ日記</a></h1>
      <a class="btn btn-outline" style="border-color:#fff;color:#fff;" href="{% url 'diary:create' %}">＋ 新しい日記</a>
    </div>
  </header>
  <main>
    <div class="container">
      {% if messages %}
        <ul class="messages">
          {% for message in messages %}<li>{{ message }}</li>{% endfor %}
        </ul>
      {% endif %}
      {% block content %}{% endblock %}
    </div>
  </main>
</body>
</html>
