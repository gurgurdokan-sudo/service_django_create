{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ user.get_full_name|default:'' }}さん日報{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'diary/css/style.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="{% url 'diary:list' %}">📔 日報</a></h1>
      <a class="btn btn-outline" style="border-color:#fff;color:#fff;" href="{% url 'diary:create' %}">＋ 新しい日報</a>
    </div>
  </header>
   <div class="position-relative">
    <!-- サイドバー -->
    <div id="sidebar">
        {% include "dashboard/components/sidebar.html" %}
    </div>
    <!-- メインコンテンツ -->
    <main>
      <div class="container">
        {% if messages %}
          <ul class="messages">
            {% for message in messages %}<li>{{ message }}</li>{% endfor %}
          </ul>
        {% endif %}
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
</body>
</html>
