{% extends "dashboard/base/base.html" %}
{% block css %}
{% load static %}
<link rel="stylesheet" href="{% static 'dashboard/css/temp.css' %}">
{% endblock %}
{% block body %}
<h2>{{ title }}</h2>
<div class="detail-card">
  <form method="post" novalidate id="assignmentForm">
    {% csrf_token %}
    {% include "dashboard/components/messages.html" %}
    <div class="as_p">
      {{ form.as_p }}
    </div>
    <input type="hidden" name="register_pattern" id="registerPattern" value="">
    <button class="btn btn-primary" type="submit">保存</button>
    <a href="{% url 'employees:assignment_list' %}" class="btn btn-secondary">戻る</a>
  </form>
</div>
<script>
// 保存時に「毎週◯曜日にシフトパターン登録しますか？」ポップアップを出す
document.getElementById('assignmentForm').addEventListener('submit', function() {
  const dateInput = this.querySelector('[name=date]');
  if (!dateInput || !dateInput.value) return;
  const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
  const weekday = weekdays[new Date(dateInput.value + 'T00:00:00').getDay()];
  const ok = confirm('毎週' + weekday + '曜日のシフトパターンとしても登録しますか？\n（OK: 毎週のパターンにする / キャンセル: この日だけ）');
  document.getElementById('registerPattern').value = ok ? '1' : '';
});
</script>
{% endblock %}
