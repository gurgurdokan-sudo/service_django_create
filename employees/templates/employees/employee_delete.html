{% extends "dashboard/base/base.html" %}
{% block css %}
{% load static %}
<link rel="stylesheet" href="{% static 'temp.css' %}">
{% endblock %}
{% block body %}
<h2>従業員の削除</h2>
<div class="detail-card">
  <p>「{{ employee.get_full_name|default:employee.username }}」を削除します。よろしいですか？</p>
  <p class="text-danger">この従業員の担当スケジュール・出退勤記録もすべて削除されます。退職の場合は削除ではなく「在籍中」のチェックを外す運用を推奨します。</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">削除する</button>
    <a href="{% url 'employees:employee_list' %}" class="btn btn-secondary">戻る</a>
  </form>
</div>
{% endblock %}
