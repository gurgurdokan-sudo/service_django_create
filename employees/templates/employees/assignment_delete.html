{% extends "dashboard/base/base.html" %}
{% block css %}
{% load static %}
<link rel="stylesheet" href="{% static 'temp.css' %}">
{% endblock %}
{% block body %}
<h2>担当割当ての削除</h2>
<div class="detail-card">
  <p>{{ assignment.date|date:"Y年n月j日" }}「{{ assignment.employee }} → {{ assignment.user.name }}」の割当てを削除します。よろしいですか？</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">削除する</button>
    <a href="{% url 'employees:assignment_list' %}?date={{ assignment.date|date:'Y-m-d' }}" class="btn btn-secondary">戻る</a>
  </form>
</div>
{% endblock %}
